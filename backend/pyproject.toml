[tool.ruff]
line-length = 88
target-version = "py312"
src = ["src"]
exclude = [".venv", "__pycache__", ".pytest_cache"]
[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
mypy_path = "src"
files = ["src/app"]
strict = false
warn_return_any = true
warn_unused_ignores = true
plugins = ["sqlalchemy.ext.mypy.plugin"]