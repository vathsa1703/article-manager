name: Weekly DB backup

on:
  schedule:
    # Sundays at 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      PG_VERSION: "17"
    steps:
      - name: Dump Neon database
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -euo pipefail
          URL="${DATABASE_URL}"
          URL="${URL/postgresql+psycopg:\/\//postgresql:\/\/}"
          docker run --rm postgres:${{ env.PG_VERSION }} \
            pg_dump "$URL" --inserts --no-owner --no-acl | gzip > backup.sql.gz
          ls -lh backup.sql.gz

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-backup-${{ github.run_number }}
          path: backup.sql.gz
          retention-days: 60
